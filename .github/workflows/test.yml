name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-yarn:
    name: Test (yarn, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.12.x
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    runs-on: "${{ matrix.os }}"
    steps:
      - run: git config --global core.autocrlf input
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "${{ matrix.node-version }}"
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Lint
        run: yarn lint
      - name: Test
        run: yarn test

  test-npm:
    name: Test (npm, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.12.x
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    runs-on: "${{ matrix.os }}"
    steps:
      - run: git config --global core.autocrlf input
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "${{ matrix.node-version }}"
      - name: Remove packageManager field for npm compatibility
        shell: bash
        run: node -e "const p=require('./package.json'); delete p.packageManager; delete p.workspaces; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npx vitest run

  test-pnpm:
    name: Test (pnpm, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.12.x
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    runs-on: "${{ matrix.os }}"
    steps:
      - run: git config --global core.autocrlf input
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Remove packageManager field for pnpm compatibility
        shell: bash
        run: node -e "const p=require('./package.json'); delete p.packageManager; delete p.workspaces; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "${{ matrix.node-version }}"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm vitest run
